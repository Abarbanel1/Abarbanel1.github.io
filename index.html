<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Abarbanel Sync</title>
</head>
<body>

<h2>Inventory</h2>
<input id="name" placeholder="Item name">
<input id="qty" placeholder="Qty">
<button onclick="addItem()">Add</button>

<ul id="inventory"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAR2gzmNBsJOtmBsUkYIoTqeNeX63_0FCg",
  authDomain: "abarbanel-12ecb.firebaseapp.com",
  projectId: "abarbanel-12ecb",
  storageBucket: "abarbanel-12ecb.firebasestorage.app",
  messagingSenderId: "1071874353551",
  appId: "1:1071874353551:web:11e656f1b65d8994c583fa"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("inventory");

// REALTIME SYNC
onSnapshot(collection(db, "inventory"), (snapshot) => {
  list.innerHTML = "";

  snapshot.forEach((docSnap) => {
    const item = docSnap.data();

    const li = document.createElement("li");
    li.textContent = item.name + " (" + item.qty + ")";

    // delete button
    const del = document.createElement("button");
    del.textContent = "❌";
    del.onclick = () => deleteItem(docSnap.id);

    li.appendChild(del);
    list.appendChild(li);
  });
});

// ADD ITEM
window.addItem = async function () {
  const name = document.getElementById("name").value;
  const qty = document.getElementById("qty").value;

  if (!name || !qty) return;

  await addDoc(collection(db, "inventory"), {
    name,
    qty
  });

  document.getElementById("name").value = "";
  document.getElementById("qty").value = "";
};

// DELETE ITEM
async function deleteItem(id) {
  await deleteDoc(doc(db, "inventory", id));
}
</script>

</body>
</html>
